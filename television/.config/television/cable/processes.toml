[metadata]
name = "processes"
description = "List processes listening on TCP ports and kill selected ones"

[source]
command = "lsof -iTCP -sTCP:LISTEN -P -n 2>/dev/null | tail -n +2 | awk '{split($9,a,\":\"); printf \"%-6s %-8s %s\\n\", a[length(a)], $2, $1}' | sort -t' ' -k1 -n | uniq"
output = "{}"

[preview]
command = "ps -p '{split: :1}' -o pid,ppid,user,%cpu,%mem,stat,start,time,command && echo && lsof -iTCP -P -n -p '{split: :1}' 2>/dev/null"

[keybindings]
ctrl-d = ["actions:kill", "reload_source"]

[actions.kill]
description = "Kill selected process"
command = "kill '{split: :1}'"
mode = "fork"
